<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anaesthesia Master</title>

<style>
*{box-sizing:border-box;}
:root{
--bg:#f7f9fc;
--section:#eef2f7;
--navy:#1e3a5f;
--green:#d9f2e6;
--yellow:#fff4cc;
--text:#1f2937;
}
.dark{
--bg:#111827;
--section:#1f2937;
--navy:#0f172a;
--green:#064e3b;
--yellow:#78350f;
--text:#f3f4f6;
}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:var(--bg);color:var(--text);}
header{background:var(--navy);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
header h1{margin:0;font-size:18px;}
.sub{font-size:12px;line-height:1.4;margin-top:4px;}
button{background:var(--navy);color:white;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:6px;}
.toggle{background:white;color:black;}
.tabs{display:flex;background:white;border-bottom:1px solid #ddd;}
.tab{flex:1;text-align:center;padding:10px;cursor:pointer;font-size:14px;}
.tab.active{border-bottom:3px solid var(--navy);font-weight:600;}
.container{max-width:1100px;margin:auto;padding:18px;}
.block{background:var(--section);padding:16px;border-radius:12px;margin-bottom:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;}
label{font-size:12px;margin-bottom:4px;}
input,select,textarea{padding:7px;border-radius:8px;border:1px solid #ccc;font-size:13px;}
textarea{min-height:50px;}
.output{background:var(--green);padding:8px;border-radius:8px;font-weight:600;margin-bottom:6px;}
.warning{background:var(--yellow);padding:6px;border-radius:6px;margin-top:6px;font-size:12px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
@media print{
body *{visibility:hidden;}
#printArea, #printArea *{visibility:visible;}
#printArea{position:absolute;left:0;top:0;width:100%;}
}
</style>
</head>

<body>

<header>
<div>
<h1>Anaesthesia Master Console</h1>
<div class="sub">
Made by<br>
Dr Jeet Sharma<br>
JR Anaesthesiology<br>
IGMC Shimla
</div>
</div>
<button id="darkToggle" class="toggle">Dark</button>
</header>

<div class="tabs">
<div class="tab active" data-tab="main">Main</div>
<div class="tab" data-tab="checklist">Checklist</div>
<div class="tab" data-tab="settings">Settings</div>
</div>

<div class="container">

<!-- MAIN -->
<div id="main" class="tab-content active">

<div class="block">
<h3>Patient</h3>
<div class="grid-2">
<div class="field"><label>CR</label><input id="cr"></div>
<div class="field"><label>Name</label><input id="name"></div>
</div>
<div class="grid-2">
<div class="field"><label>Age</label><select id="age"></select></div>
<div class="field"><label>Sex</label><select id="sex"><option>M</option><option>F</option></select></div>
</div>
<div class="grid-2">
<div class="field"><label>Weight (kg)</label><select id="weight"></select></div>
<div class="field"><label>Height (cm)</label><input id="height" type="number"></div>
</div>
<div class="grid-2">
<div class="field"><label>Hb</label><select id="hb"></select></div>
<div class="field"><label>NPO Hours</label><select id="npo"></select></div>
</div>
<button id="savePatient">Save</button>
<select id="patientList"></select>
</div>

<div class="block">
<h3>Fluids (4-2-1 Standard)</h3>
<div id="maint" class="output"></div>
<div id="deficit" class="output"></div>
<div id="h1" class="output"></div>
<div id="h2" class="output"></div>
<div id="h3" class="output"></div>
</div>

<div class="block">
<h3>Blood</h3>
<div id="ebv" class="output"></div>
<div id="abl" class="output"></div>
</div>

</div>

<!-- CHECKLIST -->
<div id="checklist" class="tab-content">
<div class="block">
<select id="templateSelect"></select>
<div id="checkItems"></div>
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab-content">
<div class="block">
<h3>Editable Formula (EBV & Hb%)</h3>
<div class="grid-2">
<div class="field"><label>Male EBV (ml/kg)</label><input id="maleEbv" type="number" value="70"></div>
<div class="field"><label>Female EBV (ml/kg)</label><input id="femaleEbv" type="number" value="65"></div>
</div>
<div class="field"><label>Lowest Hb %</label><input id="hbPercent" type="number" value="80"></div>
<button id="saveFormula">Save Formula</button>
</div>
</div>

<div id="printArea"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const tabs=document.querySelectorAll(".tab");
const contents=document.querySelectorAll(".tab-content");
tabs.forEach(t=>t.addEventListener("click",()=>{
tabs.forEach(x=>x.classList.remove("active"));
contents.forEach(c=>c.classList.remove("active"));
t.classList.add("active");
document.getElementById(t.dataset.tab).classList.add("active");
}));

// Populate dropdowns
for(let i=0;i<=100;i++)age.add(new Option(i,i));
for(let i=1;i<=200;i++)weight.add(new Option(i,i));
for(let i=0;i<=24;i++)npo.add(new Option(i,i));
for(let i=1;i<=20;i+=0.1)hb.add(new Option(i.toFixed(1),i.toFixed(1)));

// Formula persistence
if(!localStorage.getItem("formula")){
localStorage.setItem("formula",JSON.stringify({male:70,female:65,hbPct:80}));
}
function loadFormula(){
const f=JSON.parse(localStorage.getItem("formula"));
maleEbv.value=f.male;
femaleEbv.value=f.female;
hbPercent.value=f.hbPct;
}
loadFormula();

saveFormula.onclick=function(){
localStorage.setItem("formula",JSON.stringify({
male:parseFloat(maleEbv.value),
female:parseFloat(femaleEbv.value),
hbPct:parseFloat(hbPercent.value)
}));
recalc();
};

// Patient save
savePatient.onclick=function(){
if(!cr.value||!name.value){alert("CR & Name required");return;}
const patients=JSON.parse(localStorage.getItem("patients")||"{}");
patients[cr.value]={
cr:cr.value,name:name.value,age:age.value,sex:sex.value,
weight:weight.value,height:height.value,hb:hb.value,npo:npo.value,
checklist:{template:"GA",items:{}}
};
localStorage.setItem("patients",JSON.stringify(patients));
loadPatients();
};

function loadPatients(){
patientList.innerHTML="";
const patients=JSON.parse(localStorage.getItem("patients")||"{}");
Object.keys(patients).forEach(k=>{
patientList.add(new Option(patients[k].name+" ("+k+")",k));
});
}
loadPatients();

patientList.onchange=function(){
const p=JSON.parse(localStorage.getItem("patients"))[this.value];
if(!p)return;
Object.keys(p).forEach(k=>{if(document.getElementById(k))document.getElementById(k).value=p[k];});
renderChecklist();
recalc();
};

// Checklist templates
const templates={
GA:["Machine check","Drugs ready","Airway ready"],
SAB:["Consent","Resuscitation drugs","IV secured"]
};

Object.keys(templates).forEach(t=>templateSelect.add(new Option(t,t)));

templateSelect.onchange=function(){
const patients=JSON.parse(localStorage.getItem("patients"));
const p=patients[patientList.value];
if(!p)return;
p.checklist.template=this.value;
p.checklist.items={};
localStorage.setItem("patients",JSON.stringify(patients));
renderChecklist();
};

function renderChecklist(){
checkItems.innerHTML="";
const patients=JSON.parse(localStorage.getItem("patients"));
const p=patients?patients[patientList.value]:null;
if(!p)return;
const items=templates[p.checklist.template];
items.forEach(item=>{
const div=document.createElement("div");
const checked=p.checklist.items[item]?"checked":"";
div.innerHTML=`<input type="checkbox" ${checked}> ${item}`;
div.querySelector("input").onchange=function(){
p.checklist.items[item]=this.checked;
localStorage.setItem("patients",JSON.stringify(patients));
};
checkItems.appendChild(div);
});
}

// Calculations
function recalc(){
const wt=parseFloat(weight.value)||0;
const hbVal=parseFloat(hb.value)||0;
const npoVal=parseFloat(npo.value)||0;
const f=JSON.parse(localStorage.getItem("formula"));
const ebvVal=wt*(sex.value==="M"?f.male:f.female);
const lowHb=hbVal*(f.hbPct/100);

// Fluids
let maintVal=0;
if(wt<=10)maintVal=wt*4;
else if(wt<=20)maintVal=40+(wt-10)*2;
else maintVal=60+(wt-20);
maint.innerText="Maintenance: "+maintVal.toFixed(0)+" ml/hr";
const deficitVal=maintVal*npoVal;
deficit.innerText="Deficit: "+deficitVal.toFixed(0)+" ml";
h1.innerText="1st Hour: "+(maintVal+deficitVal/2).toFixed(0)+" ml";
h2.innerText="2nd Hour: "+(maintVal+deficitVal/4).toFixed(0)+" ml";
h3.innerText="3rd Hour: "+(maintVal+deficitVal/4).toFixed(0)+" ml";

// Blood
ebv.innerText="EBV: "+ebvVal.toFixed(0)+" ml";
abl.innerText="ABL: "+(hbVal?ebvVal*(hbVal-lowHb)/hbVal:0).toFixed(0)+" ml";
}

document.querySelectorAll("select,input").forEach(e=>e.addEventListener("input",recalc));
darkToggle.onclick=function(){document.body.classList.toggle("dark");};
recalc();

});
</script>

</body>
</html>
