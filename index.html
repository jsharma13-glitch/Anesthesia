<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anaesthesia Master – Final Fixed</title>

<style>
:root{
--bg:#f7f9fc;
--card:#ffffff;
--navy:#1e3a5f;
--green:#d9f2e6;
--text:#1f2937;
--muted:#6b7280;
}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
color:var(--text);
}
header{
background:var(--navy);
color:white;
padding:18px;
font-size:20px;
font-weight:600;
}
.tabs{
display:flex;
background:white;
border-bottom:1px solid #e5e7eb;
}
.tab{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
transition:0.3s;
}
.tab.active{
border-bottom:3px solid var(--navy);
color:var(--navy);
font-weight:600;
}
.container{
max-width:1000px;
margin:auto;
padding:20px;
}
.section{display:none;}
.section.active{display:block;}
.block{
background:#eef2f7;
padding:18px;
border-radius:16px;
margin-bottom:20px;
}
.block h3{margin-top:0;color:var(--navy);}
.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
input,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #d1d5db;
margin-top:6px;
margin-bottom:10px;
}
.output{
background:var(--green);
padding:10px;
border-radius:12px;
font-weight:600;
}
button{
background:var(--navy);
color:white;
border:none;
padding:8px 12px;
border-radius:12px;
cursor:pointer;
margin-right:6px;
}
</style>
</head>
<body>

<header>Anaesthesia Master Console</header>

<div class="tabs">
<div class="tab active" onclick="showTab('main',this)">Main</div>
<div class="tab" onclick="showTab('settings',this)">Settings</div>
</div>

<div class="container">

<div id="main" class="section active">

<div class="block">
<h3>Patient Inputs</h3>
<div class="grid-2">
<div>CR Number<input id="cr"></div>
<div>Name<input id="name"></div>
</div>
<button onclick="savePatient()">Save</button>
<select id="patientSelect" onchange="loadPatient()"></select>
</div>

</div>

<div id="settings" class="section">
<div class="block">
<h3>Settings</h3>
<button onclick="clearPatients()">Clear Patient Database</button>
</div>
</div>

</div>

<script>

function showTab(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
}

function getPatients(){
return JSON.parse(localStorage.getItem("patients") || "{}");
}

function setPatients(obj){
localStorage.setItem("patients", JSON.stringify(obj));
}

function savePatient(){
let crVal = cr.value.trim();
let nameVal = name.value.trim();

if(!crVal){
alert("CR number required");
return;
}
if(!nameVal){
alert("Name required");
return;
}

let patients = getPatients();

patients[crVal] = {
cr: crVal,
name: nameVal
};

setPatients(patients);

loadPatientList();

patientSelect.value = crVal;

alert("Patient saved successfully");
}

function loadPatientList(){
let patients = getPatients();
patientSelect.innerHTML = "";

for(let key in patients){
let p = patients[key];
if(!p || !p.name) continue;

let opt = document.createElement("option");
opt.value = key;
opt.textContent = p.name + " (" + key + ")";
patientSelect.appendChild(opt);
}
}

function loadPatient(){
let patients = getPatients();
let selected = patients[patientSelect.value];
if(!selected) return;

cr.value = selected.cr;
name.value = selected.name;
}

function clearPatients(){
localStorage.removeItem("patients");
loadPatientList();
alert("All patients cleared");
}

loadPatientList();

</script>

</body>
</html>
