<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anaesthesia Master</title>
<style>
body { font-family:-apple-system; margin:0; background:#f4f8fc; }
header { background:#2b6cb0; color:white; padding:14px; text-align:center; font-weight:bold; }
.container { padding:15px; max-width:900px; margin:auto; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
h3 { margin-top:0; color:#2b6cb0; }
input, select { width:100%; padding:8px; margin:5px 0; border-radius:6px; border:1px solid #ccc; }
.output { background:#edfdf5; padding:8px; border-radius:6px; font-weight:bold; }
.warning { color:#dd6b20; font-weight:bold; }
.danger { color:#e53e3e; font-weight:bold; }
button { padding:6px 10px; border:none; border-radius:6px; background:#2b6cb0; color:white; margin-top:5px; }
button.secondary { background:#38a169; }
.small { font-size:12px; color:#555; }
.row { display:flex; gap:10px; }
.row > div { flex:1; }
.hidden { display:none; }
hr { margin:15px 0; }
</style>
</head>

<body>
<header>Anaesthesia Master Console</header>
<div class="container">

<!-- INPUTS -->
<div class="card">
<h3>Inputs</h3>
<div class="row">
<div>Age <input id="age" type="number"></div>
<div>Weight (kg) <input id="weight" type="number"></div>
</div>
Height (cm) <input id="height" type="number">
Pre-op Hb <input id="hb" type="number" step="0.1">
Sex
<select id="sex">
<option value="M">Male</option>
<option value="F">Female</option>
</select>
NPO Hours <input id="npo" type="number">
</div>

<!-- BLOOD & FLUID -->
<div class="card">
<h3>Blood & Fluid</h3>
EBV <div id="ebv" class="output"></div>
Lowest Hb (80%) <div id="lowHb" class="output"></div>
ABL <div id="abl" class="output"></div>
<div id="ablAlert"></div>
<hr>
Maintenance (4-2-1) <div id="maint" class="output"></div>
NPO Deficit <div id="deficit" class="output"></div>
1st Hour <div id="h1" class="output"></div>
2nd Hour <div id="h2" class="output"></div>
3rd Hour <div id="h3" class="output"></div>
</div>

<!-- DRUGS -->
<div class="card">
<h3>Drug Doses</h3>
<div id="drugDisplay"></div>
<button onclick="toggleDrugSettings()">Edit Drugs</button>

<div id="drugSettings" class="hidden">
<hr>
<div id="drugEditor"></div>
<button class="secondary" onclick="addDrug()">Add Drug</button>
</div>
</div>

<!-- VASOPRESSOR -->
<div class="card">
<h3>Vasopressor</h3>
<select id="pressorSelect"></select>
Target mcg/kg/min <input id="target" type="number" step="0.01">
Infusion Rate <div id="rate" class="output"></div>
<button onclick="togglePressorSettings()">Edit Pressors</button>

<div id="pressorSettings" class="hidden">
<hr>
<div id="pressorEditor"></div>
<button class="secondary" onclick="addPressor()">Add Pressor</button>
</div>
</div>

<!-- CHECKLIST -->
<div class="card">
<h3>Checklist</h3>
<select id="templateSelect"></select>
<div id="checklist"></div>
<button onclick="toggleChecklistSettings()">Edit Checklist</button>

<div id="checklistSettings" class="hidden">
<hr>
<div id="checklistEditor"></div>
<button class="secondary" onclick="addChecklistItem()">Add Item</button>
</div>
</div>

</div>

<script>

/* -------------------- STORAGE -------------------- */
function getData(key, def){
return JSON.parse(localStorage.getItem(key) || JSON.stringify(def));
}
function setData(key, val){
localStorage.setItem(key, JSON.stringify(val));
}

/* -------------------- CALCULATIONS -------------------- */
function recalc(){

let age = parseFloat(ageInput.value) || 0;
let wt = parseFloat(weight.value) || 0;
let hb = parseFloat(hbInput.value) || 0;
let npo = parseFloat(npoInput.value) || 0;

let ebvFactor = age < 12 ? 75 : (sex.value == "M" ? 70 : 65);
let ebvVal = wt * ebvFactor;
let lowHbVal = 0.8 * hb;
let ablVal = hb ? ebvVal * (hb - lowHbVal) / hb : 0;

ebv.innerText = ebvVal.toFixed(0) + " ml";
lowHb.innerText = lowHbVal.toFixed(1);
abl.innerText = ablVal.toFixed(0) + " ml";

if(ablVal > 0.4 * ebvVal){
ablAlert.innerHTML = "<div class='danger'>ABL > 40% EBV</div>";
}
else if(ablVal > 0.3 * ebvVal){
ablAlert.innerHTML = "<div class='warning'>ABL > 30% EBV</div>";
}
else ablAlert.innerHTML = "";

let maintVal = wt<=10?4*wt:wt<=20?40+2*(wt-10):60+(wt-20);
maint.innerText = maintVal + " ml/hr";

let deficitVal = maintVal * npo;
deficit.innerText = deficitVal.toFixed(0) + " ml";

h1.innerText = (maintVal + deficitVal/2).toFixed(0);
h2.innerText = (maintVal + deficitVal/4).toFixed(0);
h3.innerText = (maintVal + deficitVal/4).toFixed(0);

renderDrugs();
renderPressor();

}

/* -------------------- DRUG ENGINE -------------------- */
let defaultDrugs = [
{name:"Propofol", dose:2, unit:"mg/kg", max:200},
{name:"Fentanyl", dose:2, unit:"mcg/kg", max:300}
];

function renderDrugs(){
let drugs = getData("drugs", defaultDrugs);
let wt = parseFloat(weight.value) || 0;
let html = "";

drugs.forEach((d,i)=>{
let calc = d.dose * wt;
let warn = d.max && calc > d.max;
html += `<div>${d.name}: ${calc.toFixed(1)} ${d.unit.split("/")[0]} ${warn?"<span class='danger'>⚠ Max</span>":""}</div>`;
});

drugDisplay.innerHTML = html;
}

function toggleDrugSettings(){
drugSettings.classList.toggle("hidden");
renderDrugEditor();
}

function renderDrugEditor(){
let drugs = getData("drugs", defaultDrugs);
let html = "";

drugs.forEach((d,i)=>{
html += `
<div>
<input value="${d.name}" onchange="updateDrug(${i},'name',this.value)">
<input type="number" value="${d.dose}" onchange="updateDrug(${i},'dose',this.value)">
<input value="${d.unit}" onchange="updateDrug(${i},'unit',this.value)">
<input type="number" value="${d.max}" onchange="updateDrug(${i},'max',this.value)">
<button onclick="removeDrug(${i})">X</button>
</div>
`;
});

drugEditor.innerHTML = html;
}

function updateDrug(i,key,val){
let drugs = getData("drugs", defaultDrugs);
drugs[i][key] = key=="dose"||key=="max"?parseFloat(val):val;
setData("drugs",drugs);
renderDrugs();
}

function addDrug(){
let drugs = getData("drugs", defaultDrugs);
drugs.push({name:"NewDrug",dose:1,unit:"mg/kg",max:100});
setData("drugs",drugs);
renderDrugEditor();
}

function removeDrug(i){
let drugs = getData("drugs", defaultDrugs);
drugs.splice(i,1);
setData("drugs",drugs);
renderDrugEditor();
}

/* -------------------- PRESSORS -------------------- */
let defaultPressors = [{name:"Norad", mg:4, vol:50}];

function renderPressor(){
let pressors = getData("pressors", defaultPressors);
pressorSelect.innerHTML = "";
pressors.forEach((p,i)=>{
pressorSelect.innerHTML += `<option value="${i}">${p.name}</option>`;
});

let wt = parseFloat(weight.value) || 0;
let targetVal = parseFloat(target.value) || 0;
let idx = pressorSelect.value || 0;
let p = pressors[idx];

if(!p) return;

let conc = (p.mg * 1000) / p.vol;
let rateVal = (wt * targetVal * 60) / conc;
rate.innerText = rateVal? rateVal.toFixed(1)+" ml/hr":"";
}

function togglePressorSettings(){
pressorSettings.classList.toggle("hidden");
renderPressorEditor();
}

function renderPressorEditor(){
let pressors = getData("pressors", defaultPressors);
let html = "";

pressors.forEach((p,i)=>{
html += `
<div>
<input value="${p.name}" onchange="updatePressor(${i},'name',this.value)">
<input type="number" value="${p.mg}" onchange="updatePressor(${i},'mg',this.value)">
<input type="number" value="${p.vol}" onchange="updatePressor(${i},'vol',this.value)">
<button onclick="removePressor(${i})">X</button>
</div>
`;
});

pressorEditor.innerHTML = html;
}

function updatePressor(i,key,val){
let pressors = getData("pressors", defaultPressors);
pressors[i][key] = key=="mg"||key=="vol"?parseFloat(val):val;
setData("pressors",pressors);
renderPressor();
}

function addPressor(){
let pressors = getData("pressors", defaultPressors);
pressors.push({name:"New",mg:1,vol:50});
setData("pressors",pressors);
renderPressorEditor();
}

function removePressor(i){
let pressors = getData("pressors", defaultPressors);
pressors.splice(i,1);
setData("pressors",pressors);
renderPressorEditor();
}

/* -------------------- CHECKLIST -------------------- */
let defaultChecklist = {
"General GA":["Machine check","Drugs ready","IV secured"],
"Spinal":["Consent","Resuscitation drugs ready"]
};

function renderChecklist(){
let templates = getData("checklists", defaultChecklist);
templateSelect.innerHTML = "";
for(let t in templates){
templateSelect.innerHTML += `<option>${t}</option>`;
}

let items = templates[templateSelect.value] || [];
let html="";
items.forEach(i=>{
html += `<div><input type="checkbox"> ${i}</div>`;
});
checklist.innerHTML = html;
}

function toggleChecklistSettings(){
checklistSettings.classList.toggle("hidden");
renderChecklistEditor();
}

function renderChecklistEditor(){
let templates = getData("checklists", defaultChecklist);
let items = templates[templateSelect.value] || [];
let html="";
items.forEach((item,i)=>{
html+=`
<div>
<input value="${item}" onchange="updateChecklistItem(${i},this.value)">
<button onclick="removeChecklistItem(${i})">X</button>
</div>
`;
});
checklistEditor.innerHTML = html;
}

function updateChecklistItem(i,val){
let templates = getData("checklists", defaultChecklist);
templates[templateSelect.value][i]=val;
setData("checklists",templates);
renderChecklist();
}

function addChecklistItem(){
let templates = getData("checklists", defaultChecklist);
templates[templateSelect.value].push("New Item");
setData("checklists",templates);
renderChecklistEditor();
}

function removeChecklistItem(i){
let templates = getData("checklists", defaultChecklist);
templates[templateSelect.value].splice(i,1);
setData("checklists",templates);
renderChecklistEditor();
}

/* -------------------- INIT -------------------- */
let ageInput=document.getElementById("age");
let hbInput=document.getElementById("hb");
let npoInput=document.getElementById("npo");

document.querySelectorAll("input,select").forEach(e=>e.addEventListener("input",recalc));

renderChecklist();
recalc();

</script>
</body>
</html>
