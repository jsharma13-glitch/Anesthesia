<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anaesthesia Master – Stable Final</title>

<style>
:root{
--bg:#f7f9fc;
--navy:#1e3a5f;
--green:#d9f2e6;
--section:#eef2f7;
--text:#1f2937;
--muted:#6b7280;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
color:var(--text);
}

header{
background:var(--navy);
color:white;
padding:18px;
font-size:20px;
font-weight:600;
}

.tabs{
display:flex;
background:white;
border-bottom:1px solid #e5e7eb;
}

.tab{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
transition:0.3s;
}

.tab.active{
border-bottom:3px solid var(--navy);
color:var(--navy);
font-weight:600;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.section{
display:none;
animation:fadeSlide 0.35s ease forwards;
}

.section.active{display:block;}

@keyframes fadeSlide{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.block{
background:var(--section);
padding:18px;
border-radius:16px;
margin-bottom:20px;
}

.block h3{
margin-top:0;
color:var(--navy);
}

.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

input,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #d1d5db;
margin-top:6px;
margin-bottom:10px;
}

.output{
background:var(--green);
padding:10px;
border-radius:12px;
font-weight:600;
}

button{
background:var(--navy);
color:white;
border:none;
padding:8px 12px;
border-radius:12px;
cursor:pointer;
margin-right:6px;
margin-top:6px;
}
</style>
</head>
<body>

<header>Anaesthesia Master Console</header>

<div class="tabs">
<div class="tab active" data-tab="main">Main</div>
<div class="tab" data-tab="settings">Settings</div>
</div>

<div class="container">

<div id="main" class="section active">
<div class="block">
<h3>Patient Inputs</h3>

<div class="grid-2">
<div>CR Number<input id="cr"></div>
<div>Name<input id="name"></div>
</div>

<button id="saveBtn">Save</button>

<select id="patientSelect"></select>

</div>
</div>

<div id="settings" class="section">
<div class="block">
<h3>Settings</h3>
<button id="clearBtn">Clear Patient Database</button>
</div>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const crInput = document.getElementById("cr");
const nameInput = document.getElementById("name");
const saveBtn = document.getElementById("saveBtn");
const patientSelect = document.getElementById("patientSelect");
const clearBtn = document.getElementById("clearBtn");
const tabs = document.querySelectorAll(".tab");
const sections = document.querySelectorAll(".section");

function showTab(tabName){
sections.forEach(sec=>sec.classList.remove("active"));
tabs.forEach(t=>t.classList.remove("active"));
document.getElementById(tabName).classList.add("active");
document.querySelector('[data-tab="'+tabName+'"]').classList.add("active");
}

tabs.forEach(tab=>{
tab.addEventListener("click", function(){
showTab(this.getAttribute("data-tab"));
});
});

function getPatients(){
return JSON.parse(localStorage.getItem("patients") || "{}");
}

function setPatients(obj){
localStorage.setItem("patients", JSON.stringify(obj));
}

function loadPatientList(){
const patients = getPatients();
patientSelect.innerHTML = "";

Object.keys(patients).forEach(key=>{
const p = patients[key];
if(!p || !p.name) return;
const opt = document.createElement("option");
opt.value = key;
opt.textContent = p.name + " (" + key + ")";
patientSelect.appendChild(opt);
});
}

saveBtn.addEventListener("click", function(){

const crVal = crInput.value.trim();
const nameVal = nameInput.value.trim();

if(!crVal){
alert("CR number required");
return;
}
if(!nameVal){
alert("Name required");
return;
}

const patients = getPatients();
patients[crVal] = {
cr: crVal,
name: nameVal
};

setPatients(patients);
loadPatientList();
patientSelect.value = crVal;

alert("Patient saved successfully");

});

patientSelect.addEventListener("change", function(){
const patients = getPatients();
const selected = patients[this.value];
if(!selected) return;
crInput.value = selected.cr;
nameInput.value = selected.name;
});

clearBtn.addEventListener("click", function(){
localStorage.removeItem("patients");
loadPatientList();
alert("Patient database cleared");
});

loadPatientList();

});
</script>

</body>
</html>
