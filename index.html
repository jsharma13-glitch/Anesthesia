<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anaesthesia Master</title>

<style>
*{box-sizing:border-box;}
:root{
--bg:#f7f9fc;
--section:#eef2f7;
--navy:#1e3a5f;
--green:#d9f2e6;
--yellow:#fff4cc;
--text:#1f2937;
}
.dark{
--bg:#111827;
--section:#1f2937;
--navy:#0f172a;
--green:#064e3b;
--yellow:#78350f;
--text:#f3f4f6;
}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:var(--bg);color:var(--text);}
header{background:var(--navy);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
header h1{margin:0;font-size:18px;}
.sub{font-size:12px;line-height:1.4;margin-top:4px;}
button{background:var(--navy);color:white;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:6px;}
.toggle{background:white;color:black;}
.tabs{display:flex;background:white;border-bottom:1px solid #ddd;}
.tab{flex:1;text-align:center;padding:10px;cursor:pointer;font-size:14px;}
.tab.active{border-bottom:3px solid var(--navy);font-weight:600;}
.container{max-width:1200px;margin:auto;padding:18px;}
.block{background:var(--section);padding:16px;border-radius:12px;margin-bottom:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;}
label{font-size:12px;margin-bottom:4px;}
input,select,textarea{padding:7px;border-radius:8px;border:1px solid #ccc;font-size:13px;}
textarea{min-height:50px;}
.output{background:var(--green);padding:8px;border-radius:8px;font-weight:600;margin-bottom:6px;}
.warning{background:var(--yellow);padding:6px;border-radius:6px;margin-top:6px;font-size:12px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
@media print{
body *{visibility:hidden;}
#printArea, #printArea *{visibility:visible;}
#printArea{position:absolute;left:0;top:0;width:100%;}
}
</style>
</head>

<body>

<header>
<div>
<h1>Anaesthesia Master Console</h1>
<div class="sub">
Made by<br>
Dr Jeet Sharma<br>
JR Anaesthesiology<br>
IGMC Shimla
</div>
</div>
<button id="darkToggle" class="toggle">Dark</button>
</header>

<div class="tabs">
<div class="tab active" data-tab="main">Main</div>
<div class="tab" data-tab="paeds">Paeds</div>
<div class="tab" data-tab="drugs">Drugs</div>
<div class="tab" data-tab="infusion">Infusion</div>
<div class="tab" data-tab="norad">Norad</div>
<div class="tab" data-tab="checklist">Checklist</div>
<div class="tab" data-tab="settings">Settings</div>
</div>

<div class="container">

<!-- MAIN -->
<div id="main" class="tab-content active">

<div class="block">
<h3>Patient</h3>
<div class="grid-2">
<div class="field"><label>CR</label><input id="cr"></div>
<div class="field"><label>Name</label><input id="name"></div>
</div>
<div class="grid-2">
<div class="field"><label>Age</label><select id="age"></select></div>
<div class="field"><label>Sex</label><select id="sex"><option>M</option><option>F</option></select></div>
</div>
<div class="grid-2">
<div class="field"><label>Weight (kg)</label><select id="weight"></select></div>
<div class="field"><label>Height (cm)</label><input id="height" type="number"></div>
</div>
<div class="grid-2">
<div class="field"><label>Hb</label><select id="hb"></select></div>
<div class="field"><label>NPO Hours</label><select id="npo"></select></div>
</div>
<div class="grid-2">
<div class="field"><label>ASA</label><input id="asa"></div>
<div class="field"><label>Type of Anaesthesia</label>
<select id="anatype">
<option>GA</option><option>SAB</option><option>Epidural</option>
<option>Combined</option><option>Regional</option>
<option>TIVA</option><option>MAC</option>
</select>
</div>
</div>
<div class="field"><label>Diagnosis</label><textarea id="diagnosis"></textarea></div>
<div class="field"><label>Surgery</label><textarea id="surgery"></textarea></div>
<div class="field"><label>Notes</label><textarea id="notes"></textarea></div>
<button id="savePatient">Save</button>
<select id="patientList"></select>
<button onclick="exportPDF()">Export PDF</button>
</div>

<div class="block">
<h3>Fluids (Standard 4-2-1)</h3>
<div id="maint" class="output"></div>
<div id="deficit" class="output"></div>
<div id="h1" class="output"></div>
<div id="h2" class="output"></div>
<div id="h3" class="output"></div>
<div id="further" class="output"></div>
</div>

<div class="block">
<h3>Body & Blood</h3>
<div id="ibw" class="output"></div>
<div id="bsa" class="output"></div>
<div id="ebv" class="output"></div>
<div id="lowHb" class="output"></div>
<div id="abl" class="output"></div>
<div id="prbc" class="output"></div>
</div>

</div>

<!-- PAEDS -->
<div id="paeds" class="tab-content">
<div class="block">
<div id="ett" class="output"></div>
<div id="ettC" class="output"></div>
<div id="adr" class="output"></div>
<div id="atrop" class="output"></div>
</div>
</div>

<!-- DRUGS -->
<div id="drugs" class="tab-content">
<div class="block">
<select id="drugSelect"></select>
<div id="drugDose" class="output"></div>
<div id="drugWarn"></div>
</div>
<div class="block">
<h4>Add Drug</h4>
<input id="newDrugName" placeholder="Name">
<input id="newDrugDose" placeholder="mg/kg" type="number" step="0.001">
<input id="newDrugMax" placeholder="Max dose (mg)" type="number" step="0.01">
<button id="addDrug">Add</button>
</div>
</div>

<!-- INFUSION -->
<div id="infusion" class="tab-content">
<div class="block">
<label>Target (mcg/kg/min)</label><input id="infTarget" type="number" step="0.01">
<label>Concentration (mcg/ml)</label><input id="infConc" type="number">
<div id="infRate" class="output"></div>
</div>
</div>

<!-- NORAD -->
<div id="norad" class="tab-content">
<div class="block">
<label>mg Added</label><input id="norMg" type="number" value="4">
<label>Total Volume (ml)</label><input id="norVol" type="number" value="50">
<label>Target (mcg/kg/min)</label><input id="norTarget" type="number" step="0.01">
<div id="norRate" class="output"></div>
</div>
</div>

<!-- CHECKLIST -->
<div id="checklist" class="tab-content">
<div class="block">
<select id="checkTemplate"></select>
<div id="checkItems"></div>
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab-content">
<div class="block">
<button id="backup">Download Backup</button>
<input type="file" id="restore">
<button onclick="localStorage.clear();location.reload();">Clear All Data</button>
</div>
</div>

<div id="printArea"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const tabs=document.querySelectorAll(".tab");
const contents=document.querySelectorAll(".tab-content");
tabs.forEach(t=>t.addEventListener("click",()=>{
tabs.forEach(x=>x.classList.remove("active"));
contents.forEach(c=>c.classList.remove("active"));
t.classList.add("active");
document.getElementById(t.dataset.tab).classList.add("active");
}));

// Populate dropdowns
for(let i=0;i<=100;i++)age.add(new Option(i,i));
for(let i=1;i<=200;i++)weight.add(new Option(i,i));
for(let i=0;i<=24;i++)npo.add(new Option(i,i));
for(let i=1;i<=20;i+=0.1)hb.add(new Option(i.toFixed(1),i.toFixed(1)));

// Save Patient
savePatient.onclick=function(){
if(!cr.value||!name.value){alert("CR & Name required");return;}
const patients=JSON.parse(localStorage.getItem("patients")||"{}");
patients[cr.value]={
cr:cr.value,name:name.value,age:age.value,sex:sex.value,
weight:weight.value,height:height.value,hb:hb.value,npo:npo.value,
asa:asa.value,anatype:anatype.value,
diagnosis:diagnosis.value,surgery:surgery.value,notes:notes.value
};
localStorage.setItem("patients",JSON.stringify(patients));
loadPatients();
};

function loadPatients(){
patientList.innerHTML="";
const patients=JSON.parse(localStorage.getItem("patients")||"{}");
Object.keys(patients).forEach(k=>{
patientList.add(new Option(patients[k].name+" ("+k+")",k));
});
}
loadPatients();

patientList.onchange=function(){
const p=JSON.parse(localStorage.getItem("patients"))[this.value];
if(!p)return;
Object.keys(p).forEach(k=>{if(document.getElementById(k))document.getElementById(k).value=p[k];});
recalc();
};

// Drugs
if(!localStorage.getItem("drugs")){
localStorage.setItem("drugs",JSON.stringify({
"Propofol":{dose:2,max:200},
"Fentanyl":{dose:0.002,max:0.3}
}));
}
function loadDrugs(){
drugSelect.innerHTML="";
const drugs=JSON.parse(localStorage.getItem("drugs"));
Object.keys(drugs).forEach(d=>drugSelect.add(new Option(d,d)));
}
loadDrugs();

addDrug.onclick=function(){
const drugs=JSON.parse(localStorage.getItem("drugs"));
drugs[newDrugName.value]={dose:parseFloat(newDrugDose.value),max:parseFloat(newDrugMax.value)};
localStorage.setItem("drugs",JSON.stringify(drugs));
loadDrugs();
};

// Clinical Calculations
function recalc(){

const wt=parseFloat(weight.value)||0;
const ht=parseFloat(height.value)||0;
const hbVal=parseFloat(hb.value)||0;
const npoVal=parseFloat(npo.value)||0;

// Fluids
let maintVal=0;
if(wt<=10)maintVal=wt*4;
else if(wt<=20)maintVal=40+(wt-10)*2;
else maintVal=60+(wt-20)*1;

maint.innerText="Maintenance: "+maintVal.toFixed(0)+" ml/hr";
const deficitVal=maintVal*npoVal;
deficit.innerText="Deficit: "+deficitVal.toFixed(0)+" ml";
h1.innerText="1st Hour: "+(maintVal+deficitVal/2).toFixed(0)+" ml";
h2.innerText="2nd Hour: "+(maintVal+deficitVal/4).toFixed(0)+" ml";
h3.innerText="3rd Hour: "+(maintVal+deficitVal/4).toFixed(0)+" ml";
further.innerText="Further: "+maintVal.toFixed(0)+" ml/hr";

// Blood
const ebvVal=wt*(sex.value==="M"?70:65);
const lowHbVal=hbVal*0.8;
ibw.innerText="IBW: "+(sex.value==="M"?50+0.9*(ht-152):45.5+0.9*(ht-152)).toFixed(1)+" kg";
bsa.innerText="BSA: "+(ht&&wt?Math.sqrt((ht*wt)/3600):0).toFixed(2)+" m²";
ebv.innerText="EBV: "+ebvVal.toFixed(0)+" ml";
lowHb.innerText="Lowest Hb: "+lowHbVal.toFixed(1);
abl.innerText="ABL: "+(hbVal?ebvVal*(hbVal-lowHbVal)/hbVal:0).toFixed(0)+" ml";
prbc.innerText="PRBC Units: "+(hbVal-lowHbVal).toFixed(1);

// Paeds
ett.innerText="ETT (uncuffed): "+(age.value/4+4).toFixed(1);
ettC.innerText="ETT (cuffed): "+(age.value/4+3.5).toFixed(1);
adr.innerText="Adrenaline: "+(0.01*wt).toFixed(2)+" mg";
atrop.innerText="Atropine: "+(0.02*wt).toFixed(2)+" mg";

// Drug
const drugs=JSON.parse(localStorage.getItem("drugs"));
const d=drugs[drugSelect.value];
if(d){
const dose=wt*d.dose;
drugDose.innerText=dose.toFixed(3)+" mg";
if(d.max && dose>d.max){
drugWarn.innerHTML='<div class="warning">Max dose exceeded</div>';
}else drugWarn.innerHTML="";
}

// Infusion
const target=parseFloat(infTarget.value)||0;
const conc=parseFloat(infConc.value)||1;
infRate.innerText=(wt*target*60/conc).toFixed(2)+" ml/hr";

// Norad
const nm=parseFloat(norMg.value)||0;
const nv=parseFloat(norVol.value)||1;
const nt=parseFloat(norTarget.value)||0;
const nconc=(nm*1000)/nv;
norRate.innerText=(wt*nt*60/nconc).toFixed(2)+" ml/hr";

}

document.querySelectorAll("select,input,textarea").forEach(e=>e.addEventListener("input",recalc));
drugSelect.addEventListener("change",recalc);

recalc();

// Dark mode
darkToggle.onclick=function(){document.body.classList.toggle("dark");};

// Backup
backup.onclick=function(){
const blob=new Blob([JSON.stringify(localStorage)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="anaesthesia_backup.json";
a.click();
};

restore.onchange=function(e){
const reader=new FileReader();
reader.onload=function(evt){
const data=JSON.parse(evt.target.result);
Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));
location.reload();
};
reader.readAsText(e.target.files[0]);
};

});

function exportPDF(){
const p=JSON.parse(localStorage.getItem("patients")||"{}")[patientList.value];
if(!p)return alert("Select patient");
const html=`<h2>Anaesthesia Summary</h2>
<table border="1" cellpadding="6">
<tr><td>CR</td><td>${p.cr}</td></tr>
<tr><td>Name</td><td>${p.name}</td></tr>
<tr><td>Age</td><td>${p.age}</td></tr>
<tr><td>Sex</td><td>${p.sex}</td></tr>
<tr><td>Weight</td><td>${p.weight}</td></tr>
<tr><td>Diagnosis</td><td>${p.diagnosis}</td></tr>
<tr><td>Surgery</td><td>${p.surgery}</td></tr>
<tr><td>Type</td><td>${p.anatype}</td></tr>
<tr><td>ASA</td><td>${p.asa}</td></tr>
<tr><td>Notes</td><td>${p.notes}</td></tr>
</table>`;
document.getElementById("printArea").innerHTML=html;
window.print();
}
</script>

</body>
</html>
