<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anaesthesia Master</title>

<style>
*{box-sizing:border-box;}
:root{
--bg:#f7f9fc;
--section:#eef2f7;
--navy:#1e3a5f;
--green:#d9f2e6;
--yellow:#fff4cc;
--text:#1f2937;
}
.dark{
--bg:#111827;
--section:#1f2937;
--navy:#0f172a;
--green:#064e3b;
--yellow:#78350f;
--text:#f3f4f6;
}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:var(--bg);color:var(--text);}
header{background:var(--navy);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
header h1{margin:0;font-size:18px;}
.sub{font-size:12px;line-height:1.4;margin-top:4px;}
button{background:var(--navy);color:white;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px;}
.toggle{background:white;color:black;}
.container{max-width:1100px;margin:auto;padding:18px;}
.block{background:var(--section);padding:16px;border-radius:12px;margin-bottom:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;}
label{font-size:12px;margin-bottom:4px;}
input,select,textarea{padding:7px;border-radius:8px;border:1px solid #ccc;font-size:13px;}
textarea{min-height:45px;}
.output{background:var(--green);padding:8px;border-radius:8px;font-weight:600;}
.warning{background:var(--yellow);padding:6px;border-radius:6px;margin-top:6px;font-size:12px;}
</style>
</head>
<body>

<header>
<div>
<h1>Anaesthesia Master Console</h1>
<div class="sub">
Made by<br>
Dr Jeet Sharma<br>
JR Anaesthesiology<br>
IGMC Shimla
</div>
</div>
<button id="darkToggle" class="toggle">Dark</button>
</header>

<div class="container">

<div class="block">
<h3>Patient</h3>
<div class="grid-2">
<div class="field"><label>Age</label><select id="age"></select></div>
<div class="field"><label>Weight</label><select id="weight"></select></div>
</div>
<div class="grid-2">
<div class="field"><label>Hb</label><select id="hb"></select></div>
<div class="field"><label>NPO</label><select id="npo"></select></div>
</div>
</div>

<div class="block">
<h3>Fluids (Editable 4-2-1)</h3>
<div class="grid-2">
<div class="field"><label>4 ml/kg</label><input id="c4" type="number" value="4"></div>
<div class="field"><label>2 ml/kg</label><input id="c2" type="number" value="2"></div>
</div>
<div class="field"><label>1 ml/kg</label><input id="c1" type="number" value="1"></div>
<div class="output" id="maint"></div>
<div class="output" id="deficit"></div>
</div>

<div class="block">
<h3>Drug Calculator</h3>
<select id="drugSelect"></select>
<div class="output" id="drugDose"></div>
<div id="drugWarn"></div>
</div>

<div class="block">
<h3>Backup</h3>
<button id="backup">Download Backup</button>
<input type="file" id="restore">
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const age=document.getElementById("age");
const weight=document.getElementById("weight");
const hb=document.getElementById("hb");
const npo=document.getElementById("npo");

for(let i=0;i<=100;i++)age.add(new Option(i,i));
for(let i=1;i<=200;i++)weight.add(new Option(i,i));
for(let i=1;i<=24;i++)npo.add(new Option(i,i));
for(let i=1;i<=20;i+=0.1)hb.add(new Option(i.toFixed(1),i.toFixed(1)));

if(!localStorage.getItem("drugs")){
localStorage.setItem("drugs",JSON.stringify({
"Propofol":{dose:2,max:200},
"Fentanyl":{dose:0.002,max:0.3}
}));
}

const drugSelect=document.getElementById("drugSelect");
function loadDrugs(){
drugSelect.innerHTML="";
const drugs=JSON.parse(localStorage.getItem("drugs"));
Object.keys(drugs).forEach(d=>drugSelect.add(new Option(d,d)));
}
loadDrugs();

function calcFluids(){
const wt=parseFloat(weight.value)||0;
const npoVal=parseFloat(npo.value)||0;
const c4=parseFloat(c4El.value);
const c2=parseFloat(c2El.value);
const c1=parseFloat(c1El.value);
let maintVal=0;
if(wt<=10)maintVal=wt*c4;
else if(wt<=20)maintVal=10*c4+(wt-10)*c2;
else maintVal=10*c4+10*c2+(wt-20)*c1;
maint.innerText="Maintenance: "+maintVal.toFixed(0)+" ml/hr";
deficit.innerText="Deficit: "+(maintVal*npoVal).toFixed(0)+" ml";
}

function calcDrug(){
const wt=parseFloat(weight.value)||0;
const drugs=JSON.parse(localStorage.getItem("drugs"));
const d=drugs[drugSelect.value];
if(!d)return;
const dose=wt*d.dose;
drugDose.innerText=dose.toFixed(3)+" mg";
if(d.max && dose>d.max){
drugWarn.innerHTML='<div class="warning">Max dose exceeded</div>';
}else{
drugWarn.innerHTML="";
}
}

const c4El=document.getElementById("c4");
const c2El=document.getElementById("c2");
const c1El=document.getElementById("c1");
const maint=document.getElementById("maint");
const deficit=document.getElementById("deficit");
const drugWarn=document.getElementById("drugWarn");

document.querySelectorAll("select,input").forEach(e=>e.addEventListener("input",function(){
calcFluids();
calcDrug();
}));

drugSelect.addEventListener("change",calcDrug);

calcFluids();
calcDrug();

// Dark mode
const darkToggle=document.getElementById("darkToggle");
darkToggle.addEventListener("click",function(){
document.body.classList.toggle("dark");
});

// Backup
document.getElementById("backup").addEventListener("click",function(){
const data=JSON.stringify(localStorage);
const blob=new Blob([data],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="anaesthesia_backup.json";
a.click();
});

document.getElementById("restore").addEventListener("change",function(e){
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(evt){
const data=JSON.parse(evt.target.result);
Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));
alert("Restored");
location.reload();
};
reader.readAsText(file);
});

});
</script>

</body>
</html>
